apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "extensionlib.names.fullname" . }}
  namespace: {{ .Release.Namespace }}
  {{ if .Values.deploymentAnnotations }}
  annotations:
    {{- with .Values.deploymentAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
  labels:
  {{- range $key, $value := .Values.extraLabels }}
    {{ $key }}: {{ $value }}
  {{- end }}
  {{- include "extensionlib.labels" (list .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "extensionlib.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "extensionlib.selectorLabels" . | nindent 8 }}
        {{- include "extensionlib.labels" (list .) | nindent 8 }}
        {{- range $key, $value := .Values.extraLabels }}
        {{ $key }}: {{ $value }}
        {{- end }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        oneagent.dynatrace.com/injection: "false"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with (.Values.priorityClassName | default (dig "priorityClassName" nil (.Values.global | default dict))) }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "extensionlib.imagePullSecrets" . | nindent 6 }}
      containers:
        - image: {{ include "extensionlib.image" . }}
          imagePullPolicy: {{ include "extensionlib.imagePullPolicy" . }}
          name: extension
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          env:
            {{- if .Values.gcp.existingSecret }}
            - name: STEADYBIT_EXTENSION_CREDENTIALS_KEYFILE_PATH
              value: /etc/gcp/secret/credentials.json
            {{- else }}
            - name: STEADYBIT_EXTENSION_CREDENTIALS_KEYFILE_PATH
              value: {{ .Values.gcp.credentialsKeyfilePath }}
            {{- end }}
            {{- if .Values.gcp.credentialsKeyfileJson }}
            {{- fail "breaking change: gcp.credentialsKeyfileJson is deprecated, use gcp.credentialsKeyfilePath instead or put credentialsKeyfileJson into a secret" }}
            {{- end }}
            {{- if .Values.gcp.projectID }}
            - name: STEADYBIT_EXTENSION_PROJECT_ID
              value: {{ .Values.gcp.projectID | quote }}
            {{- end }}
            {{- if .Values.gcp.projectIDs }}
            - name: STEADYBIT_EXTENSION_PROJECT_IDS
              # Accept both `projectIDs: "a,b"` (CSV) and `projectIDs: [a, b]` (list).
              # Without this dispatch, a YAML list — the natural shape given the plural
              # name — Sprintf-formats to the literal string "[a b]", which envconfig
              # then treats as a single bogus project ID.
              {{- if kindIs "slice" .Values.gcp.projectIDs }}
              value: {{ join "," .Values.gcp.projectIDs | quote }}
              {{- else }}
              value: {{ .Values.gcp.projectIDs | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.gcp.projectsAdvanced }}
            - name: STEADYBIT_EXTENSION_PROJECTS_ADVANCED
              value: {{ .Values.gcp.projectsAdvanced | quote }}
            {{- end }}
            {{- if .Values.gcp.workerThreads }}
            - name: STEADYBIT_EXTENSION_WORKER_THREADS
              value: {{ .Values.gcp.workerThreads | quote }}
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.vm }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_VM
              value: {{ join "," .Values.discovery.attributes.excludes.vm | quote }}
            {{- end }}
            {{- if .Values.discovery.enable.gkeCluster }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_GKE_CLUSTER
              value: "true"
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.gkeCluster }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_GKE_CLUSTER
              value: {{ join "," .Values.discovery.attributes.excludes.gkeCluster | quote }}
            {{- end }}
            {{- if .Values.discovery.enable.gkeNodePool }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_GKE_NODE_POOL
              value: "true"
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.gkeNodePool }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_GKE_NODE_POOL
              value: {{ join "," .Values.discovery.attributes.excludes.gkeNodePool | quote }}
            {{- end }}
            {{- if .Values.discovery.enable.mig }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_MIG
              value: "true"
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.mig }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_MIG
              value: {{ join "," .Values.discovery.attributes.excludes.mig | quote }}
            {{- end }}
            {{- if .Values.discovery.enable.cloudNat }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_CLOUD_NAT
              value: "true"
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.cloudNat }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_CLOUD_NAT
              value: {{ join "," .Values.discovery.attributes.excludes.cloudNat | quote }}
            {{- end }}
            {{- if .Values.discovery.enable.persistentDisk }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_PERSISTENT_DISK
              value: "true"
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.persistentDisk }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_PERSISTENT_DISK
              value: {{ join "," .Values.discovery.attributes.excludes.persistentDisk | quote }}
            {{- end }}
            {{- if .Values.discovery.enable.cloudSql }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_CLOUD_SQL
              value: "true"
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.cloudSql }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_CLOUD_SQL
              value: {{ join "," .Values.discovery.attributes.excludes.cloudSql | quote }}
            {{- end }}
            {{- if .Values.discovery.enable.spanner }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_SPANNER
              value: "true"
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.spanner }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_SPANNER
              value: {{ join "," .Values.discovery.attributes.excludes.spanner | quote }}
            {{- end }}
            {{- if .Values.discovery.enable.pubSubTopic }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_PUB_SUB_TOPIC
              value: "true"
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.pubSubTopic }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_PUB_SUB_TOPIC
              value: {{ join "," .Values.discovery.attributes.excludes.pubSubTopic | quote }}
            {{- end }}
            {{- if .Values.discovery.enable.pubSubSubscription }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_PUB_SUB_SUBSCRIPTION
              value: "true"
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.pubSubSubscription }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_PUB_SUB_SUBSCRIPTION
              value: {{ join "," .Values.discovery.attributes.excludes.pubSubSubscription | quote }}
            {{- end }}
            {{- if .Values.discovery.enable.memorystoreRedis }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_MEMORYSTORE_REDIS
              value: "true"
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.memorystoreRedis }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_MEMORYSTORE_REDIS
              value: {{ join "," .Values.discovery.attributes.excludes.memorystoreRedis | quote }}
            {{- end }}
            {{- if .Values.discovery.enable.cloudRun }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_CLOUD_RUN
              value: "true"
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.cloudRun }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_CLOUD_RUN
              value: {{ join "," .Values.discovery.attributes.excludes.cloudRun | quote }}
            {{- end }}
            {{- if .Values.testing.computeEndpoint }}
            - name: STEADYBIT_EXTENSION_COMPUTE_ENDPOINT
              value: {{ .Values.testing.computeEndpoint | quote }}
            {{- end }}
            {{- include "extensionlib.deployment.env" (list .) | nindent 12 }}
            {{- with .Values.extraEnv }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.gcp.existingSecret }}
            - name: secret
              mountPath: "/etc/gcp/secret"
              readOnly: true
            {{- end }}
            {{- include "extensionlib.deployment.volumeMounts" (list .) | nindent 12 }}
          livenessProbe:
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            successThreshold: {{ .Values.probes.liveness.successThreshold }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            httpGet:
              path: /health/liveness
              port: 8081
          readinessProbe:
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            httpGet:
              path: /health/readiness
              port: 8081
          {{- with .Values.containerSecurityContext }}
          securityContext:
          {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.gcp.existingSecret }}
        - name: secret
          secret:
            secretName: {{ include "gcp.secret.name" . }}
            items:
              - key: credentialsKeyfileJson
                path: credentials.json
        {{- end }}
        {{- include "extensionlib.deployment.volumes" (list .) | nindent 8 }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
      {{- toYaml . | nindent 8 }}
      {{- end }}
